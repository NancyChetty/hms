<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Slot • MediCare</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --navy:#0a1628;
    --teal:#0d9488;
    --teal-light:#14b8a6;
    --teal-pale:#f0fdfa;
    --slate:#334155;
    --muted:#94a3b8;
    --border:#e2e8f0;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'DM Sans',sans-serif;
    background:#f1f5f9;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
}

/* CARD */

.create-card{
    width:100%;
    max-width:650px;
    background:white;
    border-radius:24px;
    padding:40px;
    border:1px solid var(--border);
    box-shadow:0 10px 30px rgba(0,0,0,.04);
}

/* HEADER */

.card-header{
    margin-bottom:32px;
}

.logo{
    width:54px;
    height:54px;
    border-radius:16px;
    background:linear-gradient(135deg,var(--teal),var(--teal-light));
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:24px;
    margin-bottom:18px;
}

.title{
    font-family:'Playfair Display',serif;
    font-size:36px;
    color:var(--navy);
    margin-bottom:8px;
}

.subtitle{
    color:var(--muted);
    font-size:15px;
}

/* FORM */

form{
    display:flex;
    flex-direction:column;
    gap:22px;
}

form p{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:10px;
    font-size:14px;
    font-weight:500;
    color:var(--slate);
}

input,
select,
textarea{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#f8fafc;
    font-size:14px;
    outline:none;
    transition:.2s;
    font-family:'DM Sans',sans-serif;
}

input:focus,
select:focus,
textarea:focus{
    border-color:var(--teal);
    background:white;
    box-shadow:0 0 0 4px rgba(13,148,136,.08);
}

/* BUTTONS */

.btn-row{
    display:flex;
    gap:14px;
    margin-top:10px;
}

.save-btn{
    flex:1;
    border:none;
    background:linear-gradient(135deg,var(--teal),#0891b2);
    color:white;
    padding:15px;
    border-radius:14px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

.save-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 24px rgba(13,148,136,.25);
}

.back-btn{
    text-decoration:none;
    padding:15px 24px;
    border-radius:14px;
    background:#eef2ff;
    color:#4338ca;
    font-size:14px;
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:center;
}

.back-btn:hover{
    background:#e0e7ff;
}

/* ERRORS */

.errorlist{
    list-style:none;
    margin-top:8px;
    color:#ef4444;
    font-size:13px;
}

.helptext{
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
}

</style>
</head>

<body>

<div class="create-card">

    <div class="card-header">

        <div class="logo">
            ⚕️
        </div>

        <div class="title">
            Create Slot
        </div>

        <div class="subtitle">
            Add appointment timings for your patients. Humanity invented schedules because chaos apparently wasn't stressful enough.
        </div>

    </div>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <div class="btn-row">

            <button type="submit" class="save-btn">
                Save Slot
            </button>

            <a href="{% url 'doctor_dashboard' %}" class="back-btn">
                Back
            </a>

        </div>

    </form>

</div>

</body>
</html>
